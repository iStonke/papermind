server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    # Docker-interner DNS: löst den Backend-Upstream zur Laufzeit dynamisch auf,
    # damit ein Recreate des backend-Containers (neue IP) keinen 502 erzeugt.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        # Variable erzwingt Laufzeit-Auflösung via resolver (statt Cache beim Start).
        set $pm_backend http://backend:8040;
        proxy_pass $pm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

