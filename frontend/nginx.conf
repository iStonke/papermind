server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; frame-ancestors 'self'; base-uri 'self'" always;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    # Docker-interner DNS: löst den Backend-Upstream zur Laufzeit dynamisch auf,
    # damit ein Recreate des backend-Containers (neue IP) keinen 502 erzeugt.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        # Variable erzwingt Laufzeit-Auflösung via resolver (statt Cache beim Start).
        set $pm_backend http://backend:8040;
        proxy_pass $pm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Alpine-nginx 1.27 kennt .mjs in seiner mime.types-Datei nicht. Ohne
    # expliziten Typ wird der PDF.js-Module-Worker als application/octet-stream
    # ausgeliefert und von Safari wegen nosniff abgelehnt.
    location ~* \.mjs$ {
        try_files $uri =404;
        default_type application/javascript;
        expires -1;
    }

    location ~* \.(?:css|js|svg|png|webp|woff2?)$ {
        try_files $uri =404;
        expires 1y;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
