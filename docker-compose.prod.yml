name: papermind

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Production always uses the same-origin nginx proxy. Do not inherit a
        # stale direct backend URL from an existing .env.prod: port 8040 is not
        # published in this stack and would leave auth bootstrap requests hanging.
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    init: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    expose:
      - "80"
    volumes:
      # Gehashte Assets deploymentübergreifend behalten. So funktionieren auch
      # bereits offene/gecachte Browser-Tabs nach einem Update weiter.
      - ./.runtime/frontend-assets:/usr/share/nginx/html/assets
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - papermind_net

  # Reverse-Proxy / TLS-Terminierung: stellt http://papermind (Redirect) und
  # https://papermind bereit, lokales Zertifikat über Caddys interne CA.
  caddy:
    image: caddy:2
    restart: unless-stopped
    init: true
    logging: *default-logging
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - papermind_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8040 --no-access-log"
    restart: unless-stopped
    init: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
    environment:
      BACKEND_PORT: 8040
      DATABASE_URL: ${DATABASE_URL}
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      WORKER_DATABASE_URL: ${WORKER_DATABASE_URL}
      AI_BASE_URL: http://ai:11439
      STORAGE_PATH: ${STORAGE_PATH:-/data/storage}
      TZ: ${TZ:-Europe/Berlin}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-104857600}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      AUTO_OCR_ON_UPLOAD: ${AUTO_OCR_ON_UPLOAD:-true}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-3600}
      AUTH_REFRESH_TOKEN_TTL_SECONDS: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:-2592000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_LOGIN_RATE_LIMIT: ${AUTH_LOGIN_RATE_LIMIT:-10}
      AUTH_LOGIN_RATE_WINDOW_SECONDS: ${AUTH_LOGIN_RATE_WINDOW_SECONDS:-300}
      SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS:-500}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      MIN_TEXT_CHARS: ${MIN_TEXT_CHARS:-300}
      TEXT_CHECK_PAGES: ${TEXT_CHECK_PAGES:-2}
      SEARCH_QUERY_MAX_LENGTH: ${SEARCH_QUERY_MAX_LENGTH:-256}
      FTS_LANGUAGE: ${FTS_LANGUAGE:-german}
      INDEX_AUTO_ON_READY: ${INDEX_AUTO_ON_READY:-true}
      EMBED_MODEL: ${EMBED_MODEL:-bge-m3}
      EMBED_DIM: ${EMBED_DIM:-1024}
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE:-32}
      CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS:-1000}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-100}
      AI_EMBED_TIMEOUT_SECONDS: ${AI_EMBED_TIMEOUT_SECONDS:-30}
      AI_CHAT_TIMEOUT_SECONDS: ${AI_CHAT_TIMEOUT_SECONDS:-60}
      RETRIEVAL_MAX_TOP_K: ${RETRIEVAL_MAX_TOP_K:-20}
      DEDUPE_CANDIDATE_LIMIT: ${DEDUPE_CANDIDATE_LIMIT:-200}
      DEDUPE_TEXT_DISTANCE_THRESHOLD: ${DEDUPE_TEXT_DISTANCE_THRESHOLD:-6}
      # System-/Hardware-Status (Raspberry Pi) – siehe gemountete Host-Pfade unten
      SYSTEM_SYS_PATH: /host/sys
      SYSTEM_HOST_ROOT: /host/root
      HOST_CONTROL_DIR: /host/control
    expose:
      - "8040"
    volumes:
      - pdf_storage:${STORAGE_PATH:-/data/storage}
      # Host-Metriken (read-only): Temperatur/Lüfter/Modell aus /sys, Speicher aus /
      - /sys:/host/sys:ro
      - /:/host/root:ro
      # Power-Kommandos an den Host-Helfer (deploy/host-control)
      - ${HOST_CONTROL_DIR:-./host-control}:/host/control
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;urllib.request.urlopen("http://127.0.0.1:8040/health/live",timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    networks:
      - papermind_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    logging: *default-logging
    # Postgres-Tuning für Pi 5 (16 GB) + NVMe. Werte sind auf das Speicherlimit
    # unten (4 GB) abgestimmt; random_page_cost/effective_io_concurrency für SSD,
    # maintenance_work_mem hilft beim HNSW-Indexaufbau (Embeddings).
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=512MB
      -c work_mem=32MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_parallel_workers_per_gather=2
      -c jit=off
    shm_size: "512mb"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - papermind_net

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 11439
    restart: unless-stopped
    init: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      AI_PORT: 11439
      EMBED_MODEL: ${EMBED_MODEL:-bge-m3}
      EMBED_DIM: ${EMBED_DIM:-1024}
      EMBED_MAX_TEXTS: ${EMBED_MAX_TEXTS:-64}
      EMBED_MAX_CHARS: ${EMBED_MAX_CHARS:-4000}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "11439"
    volumes:
      - ai_models:/models
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request;urllib.request.urlopen("http://127.0.0.1:11439/health",timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - papermind_net

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: python -m app.worker.main
    restart: unless-stopped
    init: true
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2G
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      WORKER_DATABASE_URL: ${WORKER_DATABASE_URL}
      STORAGE_PATH: ${STORAGE_PATH:-/data/storage}
      TZ: ${TZ:-Europe/Berlin}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-104857600}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-1}
      WORKER_OCR_TIMEOUT_SECONDS: ${WORKER_OCR_TIMEOUT_SECONDS:-900}
      WORKER_JOB_LEASE_SECONDS: ${WORKER_JOB_LEASE_SECONDS:-120}
      WORKER_JOB_HEARTBEAT_SECONDS: ${WORKER_JOB_HEARTBEAT_SECONDS:-30}
      # OCR-Drosselung (Pi): max. parallele Seiten + 1 Thread je Seite, damit OCR
      # nicht alle Kerne auslastet (Hitze/Lüfter) und DB/API nicht aushungert.
      OCR_JOBS: ${OCR_JOBS:-3}
      OMP_THREAD_LIMIT: ${OMP_THREAD_LIMIT:-1}
      IMPORT_INBOX_DROP_PATH: ${IMPORT_INBOX_DROP_PATH:-/scan-inbox}
      IMPORT_INBOX_OWNER_USERNAME: ${IMPORT_INBOX_OWNER_USERNAME:-}
      IMPORT_INBOX_SCANNER_DEVICE_KEY: ${IMPORT_INBOX_SCANNER_DEVICE_KEY:-flatbed-pi}
      IMPORT_INBOX_SCANNER_DEVICE_NAME: ${IMPORT_INBOX_SCANNER_DEVICE_NAME:-Canon LiDE 400 am Pi}
      IMPORT_INBOX_FILE_STABLE_SECONDS: ${IMPORT_INBOX_FILE_STABLE_SECONDS:-3}
      AI_BASE_URL: http://ai:11439
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      INDEX_AUTO_ON_READY: ${INDEX_AUTO_ON_READY:-true}
      EMBED_MODEL: ${EMBED_MODEL:-bge-m3}
      EMBED_DIM: ${EMBED_DIM:-1024}
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE:-32}
      CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS:-1000}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-100}
      AI_EMBED_TIMEOUT_SECONDS: ${AI_EMBED_TIMEOUT_SECONDS:-30}
      DEDUPE_CANDIDATE_LIMIT: ${DEDUPE_CANDIDATE_LIMIT:-200}
      DEDUPE_TEXT_DISTANCE_THRESHOLD: ${DEDUPE_TEXT_DISTANCE_THRESHOLD:-6}
    volumes:
      - pdf_storage:${STORAGE_PATH:-/data/storage}
      - ./scan-inbox:${IMPORT_INBOX_DROP_PATH:-/scan-inbox}
    depends_on:
      backend:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - papermind_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  pdf_storage:
  ai_models:
  caddy_data:
  caddy_config:

networks:
  papermind_net:
    driver: bridge
