# =============================================================================
#  PaperMind – scanbd Aktionen für die Canon LiDE 400
#
#  scanbd ("scanner button daemon") lauscht auf die Hardware-Tasten und ruft bei
#  einem Druck dieses Repo-Script auf. Einbindung: Inhalt in einen device-Block
#  von /etc/scanbd/scanbd.conf übernehmen ODER per `include` einbinden, z. B.:
#
#      include("/home/pi/papermind/deploy/scan-button/scanbd-papermind.conf")
#
#  WICHTIG – Tastennamen zuerst ermitteln (siehe README.md):
#      sudo systemctl stop scanbd
#      scanbd -f -d7        # Tasten drücken, ausgegebene Sensor-Namen ablesen
#  Bei der LiDE 400 heißen die 5 Tasten i. d. R.: scan, file, email, copy, extra
#  ("file" = die PDF-Taste). Filter unten ggf. an deine Ausgabe anpassen.
#
#  Mapping (Batch-mit-Abschluss):
#    Taste "scan"  -> page    : Seite scannen und an den Batch anhängen
#    Taste "file"  -> finish  : Batch zu einer mehrseitigen PDF abschließen
# =============================================================================

action papermind-page {
    filter = "^scan.*"
    numerical-trigger {
        from-value = 1
        to-value   = 0
    }
    desc   = "PaperMind: Seite scannen (an Batch anhängen)"
    script = "/home/pi/papermind/deploy/scan-button/papermind-scan.sh page"
}

action papermind-finish {
    filter = "^file.*"
    numerical-trigger {
        from-value = 1
        to-value   = 0
    }
    desc   = "PaperMind: Batch als PDF abschließen"
    script = "/home/pi/papermind/deploy/scan-button/papermind-scan.sh finish"
}
