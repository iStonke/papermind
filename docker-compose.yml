name: papermind

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Der Prod-Container spricht die API IMMER relativ (/api) an; die nginx
        # proxyt an das Backend. VITE_API_BASE_URL aus der .env ist ausschliesslich
        # das Proxy-Ziel des Vite-Dev-Servers und darf hier NICHT eingebacken
        # werden (sonst ruft das Frontend cross-origin localhost:8040 auf).
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./.runtime/frontend-assets:/usr/share/nginx/html/assets
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - papermind_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT} --reload --reload-dir /app/app --no-access-log"
    restart: unless-stopped
    environment:
      BACKEND_PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DATABASE_URL}
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      WORKER_DATABASE_URL: ${WORKER_DATABASE_URL}
      # Dev: Swagger-Docs verfügbar. In Prod bewusst NICHT gesetzt (Schema bleibt aus).
      EXPOSE_API_DOCS: ${EXPOSE_API_DOCS:-true}
      AI_BASE_URL: ${AI_BASE_URL}
      TZ: ${TZ:-Europe/Berlin}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      STORAGE_PATH: ${STORAGE_PATH}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      AUTO_OCR_ON_UPLOAD: ${AUTO_OCR_ON_UPLOAD}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-3600}
      AUTH_REFRESH_TOKEN_TTL_SECONDS: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:-2592000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_LOGIN_RATE_LIMIT: ${AUTH_LOGIN_RATE_LIMIT:-10}
      AUTH_LOGIN_RATE_WINDOW_SECONDS: ${AUTH_LOGIN_RATE_WINDOW_SECONDS:-300}
      SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS:-500}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      MIN_TEXT_CHARS: ${MIN_TEXT_CHARS}
      TEXT_CHECK_PAGES: ${TEXT_CHECK_PAGES}
      SEARCH_QUERY_MAX_LENGTH: ${SEARCH_QUERY_MAX_LENGTH}
      FTS_LANGUAGE: ${FTS_LANGUAGE}
      INDEX_AUTO_ON_READY: ${INDEX_AUTO_ON_READY}
      EMBED_MODEL: ${EMBED_MODEL}
      EMBED_DIM: ${EMBED_DIM}
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE}
      CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS}
      AI_EMBED_TIMEOUT_SECONDS: ${AI_EMBED_TIMEOUT_SECONDS}
      RETRIEVAL_MAX_TOP_K: ${RETRIEVAL_MAX_TOP_K}
      # System-/Hardware-Status: Host-Metriken aus den read-only Mounts unten.
      # Power-Aktionen sind in Dev bewusst deaktiviert (kein HOST_CONTROL_DIR),
      # da kein Host-Helfer läuft – die Buttons zeigen dann "nicht eingerichtet".
      SYSTEM_SYS_PATH: /host/sys
      SYSTEM_HOST_ROOT: /host/root
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend:/app
      - pdf_storage:${STORAGE_PATH}
      # Host-Metriken (read-only): Temperatur/Lüfter/Modell aus /sys, Speicher aus /
      - /sys:/host/sys:ro
      - /:/host/root:ro
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os,urllib.request;urllib.request.urlopen(f"http://127.0.0.1:{os.environ['BACKEND_PORT']}/health/live",timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    networks:
      - papermind_net

  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - papermind_net

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port ${AI_PORT}
    restart: unless-stopped
    environment:
      AI_PORT: ${AI_PORT}
      EMBED_MODEL: ${EMBED_MODEL}
      EMBED_DIM: ${EMBED_DIM}
      EMBED_MAX_TEXTS: ${EMBED_MAX_TEXTS}
      EMBED_MAX_CHARS: ${EMBED_MAX_CHARS}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
    ports:
      - "${AI_PORT}:${AI_PORT}"
    volumes:
      - ./ai:/app
      - ai_models:/models
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os,urllib.request;urllib.request.urlopen(f"http://127.0.0.1:{os.environ['AI_PORT']}/health",timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - papermind_net

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: python -m app.worker.main
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      WORKER_DATABASE_URL: ${WORKER_DATABASE_URL}
      STORAGE_PATH: ${STORAGE_PATH}
      TZ: ${TZ:-Europe/Berlin}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS}
      WORKER_OCR_TIMEOUT_SECONDS: ${WORKER_OCR_TIMEOUT_SECONDS}
      WORKER_JOB_LEASE_SECONDS: ${WORKER_JOB_LEASE_SECONDS:-120}
      WORKER_JOB_HEARTBEAT_SECONDS: ${WORKER_JOB_HEARTBEAT_SECONDS:-30}
      IMPORT_INBOX_DROP_PATH: ${IMPORT_INBOX_DROP_PATH:-/scan-inbox}
      IMPORT_INBOX_FILE_STABLE_SECONDS: ${IMPORT_INBOX_FILE_STABLE_SECONDS:-3}
      AI_BASE_URL: ${AI_BASE_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      INDEX_AUTO_ON_READY: ${INDEX_AUTO_ON_READY}
      EMBED_MODEL: ${EMBED_MODEL}
      EMBED_DIM: ${EMBED_DIM}
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE}
      CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS}
      AI_EMBED_TIMEOUT_SECONDS: ${AI_EMBED_TIMEOUT_SECONDS}
    volumes:
      - ./backend/app:/app/app
      - pdf_storage:${STORAGE_PATH}
      - ./scan-inbox:${IMPORT_INBOX_DROP_PATH:-/scan-inbox}
    depends_on:
      backend:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - papermind_net

volumes:
  postgres_data:
  pdf_storage:
  ai_models:

networks:
  papermind_net:
    driver: bridge
