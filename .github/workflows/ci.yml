name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: papermind_test
          POSTGRES_USER: papermind
          POSTGRES_PASSWORD: papermind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U papermind -d papermind_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://papermind:papermind@127.0.0.1:5432/papermind_test
      AI_BASE_URL: http://127.0.0.1:11439
      STORAGE_PATH: /tmp/papermind-storage
      CORS_ALLOW_ORIGINS: http://localhost:5179
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run backend unit tests
        run: PYTHONPATH=backend python -m pytest backend/tests

      - name: Run Alembic migrations
        working-directory: backend
        env:
          INITIAL_ADMIN_USERNAME: admin
          INITIAL_ADMIN_PASSWORD: ci-bootstrap-password
          APP_DATABASE_URL: postgresql://papermind_app:papermind_app@127.0.0.1:5432/papermind_test
          WORKER_DATABASE_URL: postgresql://papermind_worker:papermind_worker@127.0.0.1:5432/papermind_test
        run: alembic upgrade head

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
